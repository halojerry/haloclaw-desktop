name: Build MateClaw Portable

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build Windows Portable
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install frontend dependencies
        working-directory: ./mateclaw-ui
        run: npm install

      - name: Build frontend
        working-directory: ./mateclaw-ui
        run: npm run build

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build plugin-api
        working-directory: ./mateclaw-plugin-api
        run: mvn clean install -DskipTests

      - name: Build backend JAR
        working-directory: ./mateclaw-server
        run: mvn clean package -DskipTests

      - name: Download JRE 21
        run: |
          wget -q https://github.com/adoptium/temurin21-binaries/releases/download/jdk-21.0.3%2B9/OpenJDK21U-jre_x64_windows_hotspot_21.0.3_9.zip -O jre.zip
          unzip -q jre.zip -d portable/
          mv portable/jdk-21.0.3+9-jre portable/jre
          rm jre.zip

      - name: Create portable package
        run: |
          mkdir -p portable/config
          cp mateclaw-server/target/mateclaw-server-*.jar portable/mateclaw.jar
          
          VERSION=$(date +%Y.%m.%d.%H%M)
          echo "{\"version\": \"$VERSION\"}" > portable/version.json
          
          printf '%s\n' \
            '@echo off' \
            'chcp 65001 >nul' \
            'cd /d "%~dp0"' \
            'echo Checking for updates...' \
            'powershell -ExecutionPolicy Bypass -File "%~dp0update.ps1" 2>nul' \
            'if exist "update_temp\portable\mateclaw.jar" (' \
            '    xcopy /Y /E "update_temp\portable\*" "."' \
            '    rmdir /S /Q "update_temp"' \
            ')' \
            'if not exist "shortcut_created.flag" (' \
            '    powershell -Command "$ws=New-Object -ComObject WScript.Shell;$s=$ws.CreateShortcut([IO.Path]::Combine($ws.SpecialFolders(\"Desktop\"),\"MateClaw.lnk\"));$s.TargetPath=\"%~dp0start.bat\";$s.Save()"' \
            '    echo. > "shortcut_created.flag"' \
            ')' \
            'start "" "jre\bin\javaw.exe" -Xms256m -Xmx512m -jar mateclaw.jar' \
            'timeout /t 5 /nobreak >nul' \
            'start http://localhost:8080' \
            > portable/start.bat
          
          printf '%s\n' \
            '$r = Invoke-RestMethod "https://api.github.com/repos/halojerry/mateclaw-releases/releases/latest" -Headers @{User-Agent="M"}' \
            '$c = (Get-Content version.json | ConvertFrom-Json).version' \
            '$l = $r.tag_name -replace "^v",""' \
            'if($l -ne $c){' \
            '  $a = $r.assets | ?{$_.name -like "*-windows.zip"} | select -First 1' \
            '  if($a){Invoke-WebRequest $a.browser_download_url -OutFile update.zip; Expand-Archive update.zip -Dest update_temp -Force; rm update.zip}' \
            '}' \
            > portable/update.ps1
          
          printf '%s\n' '@echo off' 'taskkill /F /IM javaw.exe 2>nul' 'pause' > portable/stop.bat
          
          zip -r MateClaw-Portable-$VERSION-windows.zip portable

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: portable-windows
          path: MateClaw-Portable-*.zip

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: portable-windows
          path: packages
      - id: ver
        run: echo "V=$(ls packages/*.zip | head -1 | grep -oP '\d{4}\.\d{2}\.\d{2}\.\d{4}')" >> $GITHUB_OUTPUT
      - uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.ver.outputs.V }}
          name: MateClaw Portable v${{ steps.ver.outputs.V }}
          files: packages/MateClaw-Portable-*.zip
          body: |
            ## MateClaw Portable (Windows)
            1. 解压后双击 start.bat
            2. 浏览器自动打开 http://localhost:8080
            - 内置 JRE 21
            - 首次运行创建桌面快捷方式
            - 启动时自动检查更新
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

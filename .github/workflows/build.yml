name: Build MateClaw Portable

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build Windows Portable
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install frontend dependencies
        working-directory: ./mateclaw-ui
        run: npm ci

      - name: Build frontend
        working-directory: ./mateclaw-ui
        run: npm run build

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build backend JAR
        working-directory: ./mateclaw-server
        run: mvn clean package -DskipTests

      - name: Download JRE 21
        run: |
          wget -q https://github.com/adoptium/temurin21-binaries/releases/download/jdk-21.0.3%2B9/OpenJDK21U-jre_x64_windows_hotspot_21.0.3_9.zip -O jre.zip
          unzip -q jre.zip -d portable/
          mv portable/jdk-21.0.3+9-jre portable/jre
          rm jre.zip

      - name: Create start.bat
        run: |
          mkdir -p portable/config
          cp mateclaw-server/target/mateclaw-server-*.jar portable/mateclaw.jar
          
          VERSION=$(date +%Y.%m.%d.%H%M)
          echo "{\"version\": \"$VERSION\", \"buildTime\": \"$(date -Iseconds)\"}" > portable/version.json
          
          printf '%s\n' \
            '@echo off' \
            'chcp 65001 >nul' \
            'cd /d "%~dp0"' \
            '' \
            'echo 正在检查更新...' \
            'powershell -ExecutionPolicy Bypass -File "%~dp0update.ps1" 2>nul' \
            '' \
            'if exist "update_temp\portable\mateclaw.jar" (' \
            '    echo 正在应用更新...' \
            '    xcopy /Y /E "update_temp\portable\*" "."' \
            '    rmdir /S /Q "update_temp"' \
            '    echo 更新完成！' \
            ')' \
            '' \
            'if not exist "shortcut_created.flag" (' \
            '    echo 正在创建桌面快捷方式...' \
            '    powershell -Command "$ws=New-Object -ComObject WScript.Shell;$s=$ws.CreateShortcut([IO.Path]::Combine($ws.SpecialFolders(\"Desktop\"),\"MateClaw.lnk\"));$s.TargetPath=\"%~dp0start.bat\";$s.Save()"' \
            '    echo. > "shortcut_created.flag"' \
            ')' \
            '' \
            'echo.' \
            'echo MateClaw v'$VERSION' 启动中...' \
            'start "" "jre\bin\javaw.exe" -Xms256m -Xmx512m -jar mateclaw.jar' \
            'timeout /t 5 /nobreak >nul' \
            'start http://localhost:8080' \
            > portable/start.bat

      - name: Create update.ps1
        run: |
          printf '%s\n' \
            '$updateUrl = "https://api.github.com/repos/halojerry/mateclaw-releases/releases/latest"' \
            '$current = (Get-Content version.json | ConvertFrom-Json).version' \
            'try {' \
            '    $release = Invoke-RestMethod -Uri $updateUrl -Headers @{User-Agent="MateClaw"} -TimeoutSec 10' \
            '    $latest = $release.tag_name -replace "^v", ""' \
            '    if ($latest -ne $current) {' \
            '        Write-Host "发现新版本: v$latest"' \
            '        $asset = $release.assets | Where-Object { $_.name -like "*-windows.zip" } | Select-Object -First 1' \
            '        if ($asset) {' \
            '            Invoke-WebRequest -Uri $asset.browser_download_url -OutFile "update.zip"' \
            '            Expand-Archive update.zip -DestinationPath update_temp -Force' \
            '            Remove-Item update.zip' \
            '        }' \
            '    }' \
            '} catch {}' \
            > portable/update.ps1

      - name: Create additional files
        run: |
          printf '%s\n' \
            '@echo off' \
            'taskkill /F /IM javaw.exe 2>nul' \
            'echo MateClaw 已停止' \
            'pause' \
            > portable/stop.bat
          
          printf '%s\n' \
            'MateClaw AI Assistant' \
            '' \
            '使用方法:' \
            '1. 双击 start.bat 启动' \
            '2. 浏览器自动打开 http://localhost:8080' \
            '' \
            '首次运行会创建桌面快捷方式' \
            '每次启动自动检查更新' \
            > portable/README.txt

      - name: Package
        run: |
          VERSION=$(cat portable/version.json | grep -o '"version": "[^"]*"' | cut -d'"' -f4)
          zip -r MateClaw-Portable-$VERSION-windows.zip portable

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: portable-windows
          path: MateClaw-Portable-*.zip

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: portable-windows
          path: packages
      - id: ver
        run: echo "V=$(ls packages/*.zip | head -1 | grep -oP '\d{4}\.\d{2}\.\d{2}\.\d{4}')" >> $GITHUB_OUTPUT
      - uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.ver.outputs.V }}
          name: MateClaw Portable v${{ steps.ver.outputs.V }}
          files: packages/MateClaw-Portable-*.zip
          body: |
            ## MateClaw Portable (Windows)
            
            ### 使用方法
            1. 下载并解压 zip
            2. 双击 start.bat 启动
            3. 浏览器自动打开 http://localhost:8080
            
            ### 特性
            - 内置 JRE 21
            - 自动创建桌面快捷方式
            - 启动时自动检查更新
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

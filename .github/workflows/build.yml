name: Build MateClaw Portable

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build Windows Portable
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: mateclaw-ui/package-lock.json

      - name: Install frontend dependencies
        working-directory: ./mateclaw-ui
        run: npm ci

      - name: Build frontend
        working-directory: ./mateclaw-ui
        run: npm run build

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build backend JAR
        working-directory: ./mateclaw-server
        run: mvn clean package -DskipTests

      - name: Download JRE 21 (Windows)
        run: |
          wget -q https://github.com/adoptium/temurin21-binaries/releases/download/jdk-21.0.3%2B9/OpenJDK21U-jre_x64_windows_hotspot_21.0.3_9.zip -O jre.zip
          unzip -q jre.zip -d portable/
          mv portable/jdk-21.0.3+9-jre portable/jre
          rm jre.zip

      - name: Prepare portable package
        run: |
          VERSION=$(date +%Y.%m.%d.%H%M)
          mkdir -p portable/config
          cp mateclaw-server/target/mateclaw-server-*.jar portable/mateclaw.jar
          echo "{\"version\": \"$VERSION\", \"buildTime\": \"$(date -Iseconds)\"}" > portable/version.json
          
          # 启动脚本 - 自动检查更新 + 创建桌面快捷方式
          cat > portable/start.bat << 'BATCH_EOF'
@echo off
chcp 65001 >nul
cd /d "%~dp0"

:: 检查更新
echo 正在检查更新...
powershell -ExecutionPolicy Bypass -File "%~dp0update.ps1" 2>nul

:: 检查是否需要应用更新
if exist "update_temp\portable\mateclaw.jar" (
    echo 正在应用更新...
    xcopy /Y /E "update_temp\portable\*" "." 
    rmdir /S /Q "update_temp"
    echo 更新完成！
)

:: 首次运行创建桌面快捷方式
if not exist "shortcut_created.flag" (
    echo 正在创建桌面快捷方式...
    powershell -ExecutionPolicy Bypass -Command "$ws = New-Object -ComObject WScript.Shell; $s = $ws.CreateShortcut([System.IO.Path]::Combine($ws.SpecialFolders('Desktop'), 'MateClaw.lnk')); $s.TargetPath = '%~dp0start.bat'; $s.WorkingDirectory = '%~dp0'; $s.Description = 'MateClaw AI Assistant'; $s.Save()"
    echo. > "shortcut_created.flag"
    echo 桌面快捷方式已创建！
)

:: 启动服务
echo.
echo ========================================
echo    MateClaw AI Assistant
echo    版本: %VERSION%
echo ========================================
echo.
echo 服务启动中，请稍候...
echo 启动后浏览器将自动打开...
echo 关闭此窗口将停止服务
echo.

start "" "jre\bin\javaw.exe" -Xms256m -Xmx512m -jar mateclaw.jar

:: 等待服务启动
timeout /t 5 /nobreak >nul

:: 打开浏览器
start http://localhost:8080
BATCH_EOF
          
          # 更新脚本
          cat > portable/update.ps1 << 'PS_EOF'
$updateUrl = "https://api.github.com/repos/halojerry/mateclaw-releases/releases/latest"
$versionFile = "version.json"

try {
    $current = (Get-Content $versionFile | ConvertFrom-Json).version
    $release = Invoke-RestMethod -Uri $updateUrl -Headers @{User-Agent="MateClaw-Updater"} -TimeoutSec 10
    $latest = $release.tag_name -replace '^v', ''
    
    if ($latest -ne $current) {
        Write-Host "发现新版本: v$latest (当前: v$current)"
        $asset = $release.assets | Where-Object { $_.name -like "*-windows.zip" } | Select-Object -First 1
        if ($asset) {
            Write-Host "正在下载更新..."
            $ProgressPreference = 'SilentlyContinue'
            Invoke-WebRequest -Uri $asset.browser_download_url -OutFile "update.zip" -TimeoutSec 120
            Expand-Archive -Path "update.zip" -DestinationPath "update_temp" -Force
            Remove-Item "update.zip"
            Write-Host "更新已下载，重启后生效"
        }
    } else {
        Write-Host "已是最新版本"
    }
} catch {
    Write-Host "更新检查失败: $($_.Exception.Message)"
}
PS_EOF
          
          # 停止脚本
          cat > portable/stop.bat << 'STOP_EOF'
@echo off
taskkill /F /IM javaw.exe /FI "WINDOWTITLE eq MateClaw*" 2>nul
echo MateClaw 服务已停止
pause
STOP_EOF
          
          # 使用说明
          cat > portable/README.txt << 'README_EOF'
======================================
    MateClaw AI Assistant
======================================

使用方法：
1. 双击 start.bat 启动服务
2. 浏览器自动打开 http://localhost:8080
3. 关闭命令窗口即可停止服务

首次运行会自动创建桌面快捷方式
每次启动会自动检查更新

如需手动停止，运行 stop.bat

======================================
README_EOF
          
          # 替换版本号
          sed -i "s/%VERSION%/$VERSION/g" portable/start.bat
          
          # 打包
          zip -r MateClaw-Portable-$VERSION-windows.zip portable

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: portable-windows
          path: MateClaw-Portable-*.zip

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: portable-windows
          path: packages
      - id: ver
        run: echo "V=$(ls packages/*.zip | head -1 | grep -oP '\d{4}\.\d{2}\.\d{2}\.\d{4}')" >> $GITHUB_OUTPUT
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.ver.outputs.V }}
          name: MateClaw Portable v${{ steps.ver.outputs.V }}
          files: packages/MateClaw-Portable-*.zip
          body: |
            ## MateClaw Portable (Windows)
            
            ### 使用方法
            1. 下载并解压 `MateClaw-Portable-*.zip`
            2. 双击 `start.bat` 启动
            3. 浏览器自动打开 http://localhost:8080
            
            ### 特性
            - ✅ 内置 JRE 21，无需安装 Java
            - ✅ 自动创建桌面快捷方式
            - ✅ 启动时自动检查更新
            - ✅ 绿色便携，解压即用
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
